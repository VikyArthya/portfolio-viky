name: Deploy Portfolio to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/portfolio-viky
            git pull origin main
            
            # Limitasi memori Node.js agar tidak crash saat build di RAM 512MB
            export NODE_OPTIONS="--max-old-space-size=300"
            
            npm install
            npm run build
            
            # Restart aplikasi dengan PM2
            pm2 restart portfolio || pm2 start npm --name "portfolio" --node-args="--max-old-space-size=150" -- start